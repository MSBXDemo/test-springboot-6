name: Deploy to MSBX Sandbox

# Auto-runs on first push. Deploys to AWS EKS or Azure AKS based on
# the targetCloud parameter chosen during scaffolding.
# Uses GitHub OIDC for AWS (no static keys) and Azure credentials for AKS.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TARGET_CLOUD: aws
  SERVICE_NAME: test-springboot-6
  COST_CENTER: MC-1234
  # AWS config
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: '447558490768'
  ECR_REPO: mastercard/test-springboot-6
  EKS_CLUSTER: mastercard-msbx-eks
  # Azure config
  AZURE_RG: msbx-rg-us
  AKS_CLUSTER: mastercard-msbx-aks
  SANDBOX_NAMESPACE: sandbox-test-springboot-6

jobs:
  # ── AWS Deploy (EKS) ─────────────────────────────────────────────────────
  deploy-aws:
    if: ${{ env.TARGET_CLOUD == 'aws' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/mastercard-msbx-scaffolded-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" --region "$AWS_REGION" \
                 --image-scanning-configuration scanOnPush=true \
                 --tags Key=Tenant,Value=mastercard Key=CostCenter,Value=$COST_CENTER

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push image
        id: img
        run: |
          TAG="${GITHUB_SHA::8}-$(date -u +%Y%m%d%H%M)"
          URI="${{ steps.ecr.outputs.registry }}/$ECR_REPO:$TAG"
          docker build -t "$URI" -t "${{ steps.ecr.outputs.registry }}/$ECR_REPO:latest" .
          docker push "$URI"
          docker push "${{ steps.ecr.outputs.registry }}/$ECR_REPO:latest"
          echo "uri=$URI" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"

      - name: Provision namespace + deploy
        run: |
          kubectl get namespace "$SANDBOX_NAMESPACE" >/dev/null 2>&1 \
            || kubectl create namespace "$SANDBOX_NAMESPACE"
          kubectl label namespace "$SANDBOX_NAMESPACE" \
            tenant=mastercard sandbox=$SERVICE_NAME \
            cost-center=$COST_CENTER managed-by=msbx-portal --overwrite
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: sandbox-quota
            namespace: $SANDBOX_NAMESPACE
          spec:
            hard:
              requests.cpu: "2"
              requests.memory: 4Gi
              limits.cpu: "4"
              limits.memory: 8Gi
              pods: "10"
          EOF
          sed -i "s|IMAGE_PLACEHOLDER|${{ steps.img.outputs.uri }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/$SERVICE_NAME -n $SANDBOX_NAMESPACE --timeout=5m

      - name: Print sandbox URL
        run: |
          for i in {1..30}; do
            HOST=$(kubectl get ingress "$SERVICE_NAME" -n "$SANDBOX_NAMESPACE" \
                     -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOST" ]; then
              echo "Sandbox live at: http://$HOST"
              break
            fi
            sleep 10
          done

  # ── Azure Deploy (AKS) ───────────────────────────────────────────────────
  deploy-azure:
    if: ${{ env.TARGET_CLOUD == 'azure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build + push to ACR
        run: |
          ACR_NAME="mastercardmsbxacr"
          # Create ACR if needed (first deploy)
          az acr show --name $ACR_NAME --resource-group $AZURE_RG >/dev/null 2>&1 \
            || az acr create --name $ACR_NAME --resource-group $AZURE_RG --sku Basic --admin-enabled true
          az acr login --name $ACR_NAME
          TAG="${GITHUB_SHA::8}-$(date -u +%Y%m%d%H%M)"
          IMAGE="$ACR_NAME.azurecr.io/$SERVICE_NAME:$TAG"
          docker build -t "$IMAGE" -t "$ACR_NAME.azurecr.io/$SERVICE_NAME:latest" .
          docker push "$IMAGE"
          docker push "$ACR_NAME.azurecr.io/$SERVICE_NAME:latest"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: az aks get-credentials --name $AKS_CLUSTER --resource-group $AZURE_RG --overwrite-existing

      - name: Provision namespace + deploy
        run: |
          kubectl get namespace "$SANDBOX_NAMESPACE" >/dev/null 2>&1 \
            || kubectl create namespace "$SANDBOX_NAMESPACE"
          kubectl label namespace "$SANDBOX_NAMESPACE" \
            tenant=mastercard sandbox=$SERVICE_NAME \
            cost-center=$COST_CENTER managed-by=msbx-portal --overwrite
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: sandbox-quota
            namespace: $SANDBOX_NAMESPACE
          spec:
            hard:
              requests.cpu: "2"
              requests.memory: 4Gi
              limits.cpu: "4"
              limits.memory: 8Gi
              pods: "10"
          EOF
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/$SERVICE_NAME -n $SANDBOX_NAMESPACE --timeout=5m
          echo "Deployed to AKS namespace: $SANDBOX_NAMESPACE"

      - name: Print sandbox info
        run: |
          SVC_IP=$(kubectl get svc "$SERVICE_NAME" -n "$SANDBOX_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "Sandbox live at: http://$SVC_IP"
          echo "Namespace: $SANDBOX_NAMESPACE"
          echo "Cluster: $AKS_CLUSTER"
